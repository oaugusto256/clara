name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest
      - name: Install
        run: pnpm install
      - name: Lint (Biome)
        run: pnpm -r run lint
      - name: Build
        run: pnpm -r run build
      - name: Test
        run: pnpm -r run test:ci
