version: '3.9'
services:
  postgres:
    image: postgres:15
    container_name: clara_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: clara
      POSTGRES_USER: clara
      POSTGRES_PASSWORD: clara
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ../../..
      dockerfile: devops/docker/api/Dockerfile.prod
    container_name: clara_api_prod
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://clara:clara@postgres:5432/clara
    depends_on:
      - postgres

volumes:
  pgdata:
